<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>NesGood Health Cycle</title>

  <link
    rel="stylesheet"
    href="./src/styles.css"
  >
</head>

<body>

  <h1>NesGood Health Cycle</h1>

  <h2>Choisis ton équipe</h2>

  <div class="team-grid">

    <button id="vert" class="team-btn team-green">
      <span class="team-dot">🟢</span>
      <span>Équipe Verte</span>
    </button>

    <button id="jaune" class="team-btn team-yellow">
      <span class="team-dot">🟡</span>
      <span>Équipe Jaune</span>
    </button>

    <button id="bleu" class="team-btn team-blue">
      <span class="team-dot">🔵</span>
      <span>Équipe Bleue</span>
    </button>

    <button id="rouge" class="team-btn team-red">
      <span class="team-dot">🔴</span>
      <span>Équipe Rouge</span>
    </button>

  </div>

  <div id="resultat"></div>

  <script
    type="module"
    src="./src/main.js"
  ></script>

</body>
</html>
