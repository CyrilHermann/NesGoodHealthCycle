<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nes Good Health Cycle</title>

    <link rel="stylesheet" href="./src/styles.css">
</head>

<body>

    <header class="app-header">

        <img
            src="./assets/logo/Logo.png"
            alt="Nes Good Health Cycle"
            class="app-logo">

        <h2>Quelle est ton équipe ?</h2>

    </header>

    <div id="calendarStatus" class="calendar-status loading">
        Chargement du calendrier...
    </div>

    <div class="loading-message">
        Le coach prépare ton calendrier personnalisé...
    </div>

    <div class="team-grid">

        <button id="vert" class="team-btn team-green">
            <span class="team-dot">🟢</span>
            Équipe Verte
        </button>

        <button id="jaune" class="team-btn team-yellow">
            <span class="team-dot">🟡</span>
            Équipe Jaune
        </button>

        <button id="bleu" class="team-btn team-blue">
            <span class="team-dot">🔵</span>
            Équipe Bleue
        </button>

        <button id="rouge" class="team-btn team-red">
            <span class="team-dot">🔴</span>
            Équipe Rouge
        </button>

    </div>

    <main id="resultat"></main>

    <script type="module" src="./src/main.js"></script>

</body>

</html>
