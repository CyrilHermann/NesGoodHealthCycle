<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>NesGood Health Cycle</title>
</head>
<body>

<h1>NesGood Health Cycle</h1>

<h2>Choisis ton équipe</h2>

<button id="vert">🟢 Vert</button>
<button id="jaune">🟡 Jaune</button>
<button id="bleu">🔵 Bleu</button>
<button id="rouge">🔴 Rouge</button>

<div id="resultat"></div>

<script>
const cycles = {
  vert: {
    emoji: "🟢",
    equipe: "Équipe Verte",
    titre: "Ton prochain cycle est constitué de 5 matins.",
    objectif: "Bien démarrer sans accumuler de fatigue.",
    sommeil: "Limiter la dette de sommeil avec un coucher régulier, idéalement entre 21h30 et 22h30. Éviter les gros décalages et prévoir 7 à 8 h de sommeil.",
    nutrition: "Prendre un petit-déjeuner complet, boire régulièrement et prévoir une collation vers 10h–11h si besoin.",
    activite: "Réveiller le corps avec des étirements, quelques respirations profondes, de l’eau froide sur les mains ou le visage, et quelques gorgées d’eau.",
    recette: "Avoine Double Chocolat."
  },

  jaune: {
    emoji: "🟡",
    equipe: "Équipe Jaune",
    titre: "Tu es actuellement en période de nuits consécutives.",
    objectif: "Tenir sur la durée et récupérer.",
    sommeil: "Garder une plage de sommeil stable, dans un environnement noir, calme et frais. Prévoir 7 à 8 h de sommeil au total.",
    nutrition: "Faire un repas principal avant la nuit, prévoir des collations toutes les 3 à 4 h et boire régulièrement.",
    activite: "Maintenir la vigilance : changer de position, rouler les épaules, regarder au loin, se masser la nuque ou les tempes, respirer lentement.",
    recette: "Boule énergie amande-coco."
  },

  bleu: {
    emoji: "🔵",
    equipe: "Équipe Bleue",
    titre: "Tu es dans une phase de retour au rythme de jour.",
    objectif: "Revenir au rythme de jour sans s’épuiser.",
    sommeil: "Après la dernière nuit, dormir 3 à 5 h maximum le matin, éviter de redormir longtemps l’après-midi et se coucher entre 21h30 et 23h.",
    nutrition: "Revenir à trois repas de jour : petit-déjeuner, dîner, souper. Boire régulièrement dans la journée.",
    activite: "S’exposer à la lumière, marcher doucement, faire des étirements ou des activités simples du quotidien.",
    recette: "Smoothie fraise."
  },

  rouge: {
    emoji: "🔴",
    equipe: "Équipe Rouge",
    titre: "Tu prépares ton passage au rythme de nuit.",
    objectif: "Préparer le passage au rythme de nuit.",
    sommeil: "Faire une sieste courte de 20 à 30 minutes entre 13h et 15h, décaler progressivement le coucher et éviter les longues siestes tardives.",
    nutrition: "Décaler progressivement les repas, manger léger avant la première nuit et maintenir une hydratation régulière.",
    activite: "Faire une activité douce de 20 à 40 minutes, idéalement le matin ou en début d’après-midi.",
    recette: "Muffins aux œufs."
  }
};

function afficherEquipe(couleur) {
  const data = cycles[couleur];

  document.getElementById("resultat").innerHTML = `
  <h2>${data.emoji} ${data.equipe}</h2>
  <h3>${data.titre}</h3>
  <p><strong>Objectif :</strong> ${data.objectif}</p>

  <h3>🛌 Sommeil</h3>
  <p>${data.sommeil}</p>

  <h3>🍽️ Nutrition</h3>
  <p>${data.nutrition}</p>

  <h3>🏃 Activité</h3>
  <p>${data.activite}</p>

  <h3>🍴 Recette proposée</h3>
  <p>${data.recette}</p>
`;
}

document.getElementById("vert").addEventListener("click", () => afficherEquipe("vert"));
document.getElementById("jaune").addEventListener("click", () => afficherEquipe("jaune"));
document.getElementById("bleu").addEventListener("click", () => afficherEquipe("bleu"));
document.getElementById("rouge").addEventListener("click", () => afficherEquipe("rouge"));
</script>

</body>
</html>
