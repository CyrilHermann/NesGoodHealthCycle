<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administration - NesGood Health Cycle</title>
</head>
<body>

  <h1>Administration</h1>

  <section id="login">
    <h2>Connexion administrateur</h2>

    <input
      type="password"
      id="adminCode"
      placeholder="Code administrateur"
    />

    <button id="loginBtn">Se connecter</button>

    <p id="loginMessage"></p>
  </section>

  <section id="adminPanel" style="display: none;">
    <h2>Importer le calendrier annuel</h2>

    <input
      type="file"
      id="calendarFile"
      accept=".xlsx,.xlsm,.xls"
    />

    <button id="importBtn">Générer calendar.json</button>

    <p id="fileMessage"></p>
  </section>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

  <script type="module">
    import { parseExcel } from "./src/excelParser.js";

    const ADMIN_CODE = "1234";

    const loginBtn = document.getElementById("loginBtn");
    const adminCode = document.getElementById("adminCode");
    const loginMessage = document.getElementById("loginMessage");
    const adminPanel = document.getElementById("adminPanel");
    const fileMessage = document.getElementById("fileMessage");

    loginBtn.addEventListener("click", () => {
      if (adminCode.value === ADMIN_CODE) {
        document.getElementById("login").style.display = "none";
        adminPanel.style.display = "block";
      } else {
        loginMessage.textContent = "Code incorrect.";
      }
    });

    document.getElementById("importBtn").addEventListener("click", () => {
      const fileInput = document.getElementById("calendarFile");
      const file = fileInput.files[0];

      if (!file) {
        fileMessage.textContent = "Choisis d'abord un fichier Excel.";
        return;
      }

      fileMessage.textContent = "Lecture du fichier Excel...";

      const reader = new FileReader();

      reader.onload = (event) => {
        try {
          const data = event.target.result;

          const workbook = XLSX.read(data, {
            type: "array",
            cellStyles: true
          });

          const result = parseExcel(workbook);

          const jsonContent = JSON.stringify(result.calendar, null, 2);

          const blob = new Blob([jsonContent], {
            type: "application/json"
          });

          const url = URL.createObjectURL(blob);

          const downloadLink = document.createElement("a");
          downloadLink.href = url;
          downloadLink.download = "calendar.json";
          downloadLink.click();

          URL.revokeObjectURL(url);

          fileMessage.textContent =
            `calendar.json généré avec succès : ${result.totalDates} jours. Upload ce fichier à la racine GitHub.`;

          console.log("Calendrier généré :", result.calendar);

        } catch (error) {
          console.error(error);
          fileMessage.textContent =
            "Erreur pendant la génération du calendrier.";
        }
      };

      reader.readAsArrayBuffer(file);
    });
  </script>

</body>
</html>
