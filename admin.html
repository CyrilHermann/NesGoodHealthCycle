<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Administration - NesGood Health Cycle</title>
</head>
<body>

  <h1>Administration</h1>

  <section id="login">
    <h2>Connexion administrateur</h2>

    <input
      type="password"
      id="adminCode"
      placeholder="Code administrateur"
    />

    <button id="loginBtn">Se connecter</button>

    <p id="loginMessage"></p>
  </section>

  <section id="adminPanel" style="display: none;">
    <h2>Importer le calendrier annuel</h2>

    <input
      type="file"
      id="calendarFile"
      accept=".xlsx,.xlsm,.xls"
    />

    <button id="importBtn">Importer le calendrier</button>

    <p id="fileMessage"></p>
  </section>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

  <script type="module">
    import { parseExcel } from "./src/excelParser.js";

    const ADMIN_CODE = "1234";

    const loginBtn = document.getElementById("loginBtn");
    const adminCode = document.getElementById("adminCode");
    const loginMessage = document.getElementById("loginMessage");
    const adminPanel = document.getElementById("adminPanel");
    const fileMessage = document.getElementById("fileMessage");

    loginBtn.addEventListener("click", () => {
      if (adminCode.value === ADMIN_CODE) {
        document.getElementById("login").style.display = "none";
        adminPanel.style.display = "block";
      } else {
        loginMessage.textContent = "Code incorrect.";
      }
    });

    document.getElementById("importBtn").addEventListener("click", () => {
      const fileInput = document.getElementById("calendarFile");
      const file = fileInput.files[0];

      if (!file) {
        fileMessage.textContent = "Choisis d'abord un fichier Excel.";
        return;
      }

      fileMessage.textContent = "Lecture du fichier Excel...";

      const reader = new FileReader();

      reader.onload = async (event) => {
        try {
          const data = event.target.result;

          const workbook = XLSX.read(data, {
            type: "array",
            cellStyles: true
          });

          const result = parseExcel(workbook);

          localStorage.setItem(
            "nesgood-calendar",
            JSON.stringify(result.calendar)
          );

          fileMessage.textContent =
            "Calendrier généré. Envoi vers Airtable...";

          const response = await fetch("/.netlify/functions/saveCalendar", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              calendar: result.calendar
            })
          });

          const responseText = await response.text();

          if (!response.ok) {
            console.error("Erreur Airtable :", responseText);
            fileMessage.textContent =
              "Erreur pendant l'envoi vers Airtable. Voir la console.";
            return;
          }

          console.log("Réponse Netlify :", responseText);

          fileMessage.textContent =
            `Calendrier importé et sauvegardé dans Airtable. ${result.year} - ${result.totalDates} jours.`;

        } catch (error) {
          console.error(error);
          fileMessage.textContent =
            "Erreur pendant l'import du calendrier.";
        }
      };

      reader.readAsArrayBuffer(file);
    });
  </script>

</body>
</html>
