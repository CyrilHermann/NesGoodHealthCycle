<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Administration - NesGood Health Cycle</title>
</head>
<body>

  <h1>Administration</h1>

  <section id="login">
    <h2>Connexion administrateur</h2>

    <input
      type="password"
      id="adminCode"
      placeholder="Code administrateur"
    />

    <button id="loginBtn">Se connecter</button>

    <p id="loginMessage"></p>
  </section>

  <section id="adminPanel" style="display: none;">
    <h2>Importer le calendrier annuel</h2>

    <input
      type="file"
      id="calendarFile"
      accept=".xlsx,.xlsm,.xls"
    />

    <button id="importBtn">Importer le calendrier</button>

    <p id="fileMessage"></p>
  </section>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

  <script>
    const ADMIN_CODE = "1234";

    const loginBtn = document.getElementById("loginBtn");
    const adminCode = document.getElementById("adminCode");
    const loginMessage = document.getElementById("loginMessage");
    const adminPanel = document.getElementById("adminPanel");

    loginBtn.addEventListener("click", () => {
      if (adminCode.value === ADMIN_CODE) {
        document.getElementById("login").style.display = "none";
        adminPanel.style.display = "block";
      } else {
        loginMessage.textContent = "Code incorrect.";
      }
    });

    document.getElementById("importBtn").addEventListener("click", () => {
      const fileInput = document.getElementById("calendarFile");
      const file = fileInput.files[0];

      if (!file) {
        document.getElementById("fileMessage").textContent =
          "Choisis d'abord un fichier Excel.";
        return;
      }

      const reader = new FileReader();

      reader.onload = (event) => {
  const data = event.target.result;

  const workbook = XLSX.read(data, {
    type: "array"
  });

  console.log("Noms des feuilles :", workbook.SheetNames);

  const firstSheetName = workbook.SheetNames[0];

  const worksheet = workbook.Sheets[firstSheetName];

  console.log("Feuille :", worksheet);

  const jsonData = XLSX.utils.sheet_to_json(worksheet, {
    header: 1
  });

  console.log("Contenu de la feuille :", jsonData);

  document.getElementById("fileMessage").textContent =
    `Fichier chargé : ${file.name}`;
};

      reader.readAsArrayBuffer(file);
    });
  </script>

</body>
</html>
